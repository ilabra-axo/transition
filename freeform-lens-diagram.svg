<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="35" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">Freeform Lens for Homogeneous Illumination</text>
  
  <!-- Cross-section view of the optical system -->
  <g transform="translate(400, 250)">
    <!-- Optical axis -->
    <line x1="-350" y1="0" x2="350" y2="0" stroke="#999999" stroke-width="1" stroke-dasharray="5,5"/>
    
    <!-- LED Source -->
    <rect x="-170" y="-10" width="20" height="20" fill="#ffcc00" stroke="#000000" stroke-width="1"/>
    <text x="-160" y="30" font-family="Arial" font-size="12" text-anchor="middle">RGB LED</text>
    
    <!-- LED rays -->
    <line x1="-150" y1="-8" x2="-90" y2="-70" stroke="#ffcc00" stroke-width="1" opacity="0.7"/>
    <line x1="-150" y1="0" x2="-90" y2="0" stroke="#ffcc00" stroke-width="1" opacity="0.7"/>
    <line x1="-150" y1="8" x2="-90" y2="70" stroke="#ffcc00" stroke-width="1" opacity="0.7"/>
    
    <!-- Freeform lens cross-section -->
    <path d="M -90,-80 
             Q -60,-85 -30,-80 
             Q 0,-75 30,-60 
             Q 60,-35 90,0 
             Q 60,35 30,60 
             Q 0,75 -30,80 
             Q -60,85 -90,80 
             Z" 
          fill="#add8e6" fill-opacity="0.7" stroke="#000000" stroke-width="1.5"/>
    
    <!-- Control points for freeform surface -->
    <circle cx="-90" cy="-80" r="3" fill="#ff0000"/>
    <circle cx="-30" cy="-80" r="3" fill="#ff0000"/>
    <circle cx="30" cy="-60" r="3" fill="#ff0000"/>
    <circle cx="90" cy="0" r="3" fill="#ff0000"/>
    <circle cx="30" cy="60" r="3" fill="#ff0000"/>
    <circle cx="-30" cy="80" r="3" fill="#ff0000"/>
    <circle cx="-90" cy="80" r="3" fill="#ff0000"/>
    
    <!-- Refracted light rays -->
    <line x1="90" y1="-60" x2="300" y2="-100" stroke="#87cefa" stroke-width="1"/>
    <line x1="90" y1="-30" x2="300" y2="-50" stroke="#87cefa" stroke-width="1"/>
    <line x1="90" y1="0" x2="300" y2="0" stroke="#87cefa" stroke-width="1"/>
    <line x1="90" y1="30" x2="300" y2="50" stroke="#87cefa" stroke-width="1"/>
    <line x1="90" y1="60" x2="300" y2="100" stroke="#87cefa" stroke-width="1"/>
    
    <!-- Target illumination area -->
    <rect x="300" y="-100" width="10" height="200" fill="#f0f0f0" stroke="#000000" stroke-width="1"/>
    <text x="320" y="0" font-family="Arial" font-size="12" text-anchor="start">Target Surface</text>
    
    <!-- Illumination pattern visualization (top view) -->
    <g transform="translate(0, -170)">
      <rect x="250" y="-60" width="120" height="120" fill="#f0f0f0" stroke="#000000" stroke-width="1"/>
      <text x="310" y="-70" font-family="Arial" font-size="10" text-anchor="middle">Illumination Pattern</text>
      
      <!-- Radial gradient to represent uniform illumination -->
      <circle cx="310" cy="0" r="50" fill="url(#illuminationGradient)"/>
      
      <!-- Color bar to represent uniformity -->
      <rect x="250" y="70" width="120" height="10" fill="url(#uniformityGradient)"/>
      <text x="250" y="90" font-family="Arial" font-size="8" text-anchor="start">Low</text>
      <text x="370" y="90" font-family="Arial" font-size="8" text-anchor="end">High</text>
      <text x="310" y="90" font-family="Arial" font-size="8" text-anchor="middle">Uniformity</text>
    </g>
  </g>
  
  <!-- Labels for lens components -->
  <text x="200" y="170" font-family="Arial" font-size="14" text-anchor="end" font-weight="bold">Freeform Lens</text>
  <line x1="210" y1="170" x2="290" y2="170" stroke="#000000" stroke-width="1"/>
  
  <text x="600" y="170" font-family="Arial" font-size="14" text-anchor="start" font-weight="bold">Optimized for:</text>
  <text x="600" y="195" font-family="Arial" font-size="12" text-anchor="start">• Maximum Uniformity</text>
  <text x="600" y="215" font-family="Arial" font-size="12" text-anchor="start">• Efficient Light Collection</text>
  <text x="600" y="235" font-family="Arial" font-size="12" text-anchor="start">• Color Mixing</text>
  
  <!-- Legend for control points -->
  <circle cx="600" cy="260" r="3" fill="#ff0000"/>
  <text x="610" y="263" font-family="Arial" font-size="12" text-anchor="start">Control Points</text>
  
  <!-- Performance metrics box -->
  <rect x="550" y="280" width="200" height="130" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="650" y="300" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Performance Metrics</text>
  <text x="560" y="325" font-family="Arial" font-size="12" text-anchor="start">• Uniformity: >80%</text>
  <text x="560" y="345" font-family="Arial" font-size="12" text-anchor="start">• Efficiency: >90%</text>
  <text x="560" y="365" font-family="Arial" font-size="12" text-anchor="start">• Max Thickness: 10mm</text>
  <text x="560" y="385" font-family="Arial" font-size="12" text-anchor="start">• Material: PMMA (n=1.49)</text>
  <text x="560" y="405" font-family="Arial" font-size="12" text-anchor="start">• RGB LED: 100mW</text>
  
  <!-- Definitions -->
  <defs>
    <!-- Gradient for illumination pattern -->
    <radialGradient id="illuminationGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#f0f0ff"/>
      <stop offset="100%" stop-color="#e0e0ff"/>
    </radialGradient>
    
    <!-- Gradient for uniformity scale -->
    <linearGradient id="uniformityGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9999"/>
      <stop offset="50%" stop-color="#ffff99"/>
      <stop offset="100%" stop-color="#99ff99"/>
    </linearGradient>
  </defs>
</svg>